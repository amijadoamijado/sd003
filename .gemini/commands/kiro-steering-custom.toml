description = "カスタムステアリングドキュメントを作成"
prompt = """
# カスタムステアリング作成

{{args}} をテーマとしたカスタムステアリングドキュメントを作成してください。

## 実行手順
1. テーマに基づくドキュメント構造を設計
2. 既存ステアリングとの整合性確認
3. `.kiro/steering/{theme}.md` を作成
4. product.md/tech.mdへの参照追加

## 出力ファイル
- .kiro/steering/{theme}.md

## ドキュメント構成
- 目的と背景
- 適用範囲
- ガイドライン
- 関連ドキュメントへのリンク
"""
