description = "実装の品質を検証"
prompt = """
# 実装検証タスク

{{args}} の実装品質を検証してください。

## 実行手順
1. 品質ゲートを順次実行
2. 要件カバレッジを確認
3. 問題点をリスト化
4. Validation Report を生成

## 8段階品質ゲート
| Gate | Name | Check |
|------|------|-------|
| 1 | Syntax | TypeScriptコンパイル |
| 2 | Type | 型整合性 |
| 3 | Lint | ESLintエラー0件 |
| 4 | Security | 脆弱性スキャン |
| 5 | Test | カバレッジ80%以上 |
| 6 | Performance | 6分制限確認 |
| 7 | Documentation | JSDoc完備 |
| 8 | Integration | E2Eテスト |

## 出力レポート形式
```markdown
## Validation Complete
### Quality Gate Status
| Gate | Status |
### Requirement Coverage
### Issues Found
### Next Steps
```
"""
