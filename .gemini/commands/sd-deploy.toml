3. **検証省略禁止** - Phase 4を必ず実行

### 既存ファイルの扱い

- 既存ファイルは上書きしない（バックアップ推奨）
- 上書きが必要な場合はユーザーに確認

### session-current.md と TIMELINE.md

- **新規作成する**（sd003からコピーしない）
- プロジェクト固有の初期内容を記載

